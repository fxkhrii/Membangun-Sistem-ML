version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_sml
    ports:
      - "9090:9090"
    volumes:
      - ./2.prometheus.yml:/etc/prometheus/prometheus.yml
    # network_mode: "host" tidak selalu jalan dengan baik di Windows/Mac,
    # Kita menggunakan "host.docker.internal" di dalam prometheus.yml untuk mengakses port 8000 di host.

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_sml
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
