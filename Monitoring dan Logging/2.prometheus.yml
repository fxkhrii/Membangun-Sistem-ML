global:
  scrape_interval: 5s # Frekuensi scraping metrik

scrape_configs:
  - job_name: 'mlflow_model_exporter'
    static_configs:
      - targets: ['host.docker.internal:8000']
        # host.docker.internal digunakan karena prometheus_exporter berjalan di localhost mesin host (bukan di dalam container Prometheus)
